services:
  # Servidor Prefect local (UI web)
  prefect-server:
    build: .
    container_name: prefect-server-local
    restart: unless-stopped
    command: ["prefect-server"]

    ports:
      - "4200:4200"

    networks:
      - prefect-network

  # ServiĂ§o padrĂŁo: workflow COMBINADO (pluviomĂ©tricos + meteorolĂłgicos)
  # Usa Prefect local para visualizaĂ§ĂŁo das execuĂ§Ăµes em tempo real.
  prefect-service:
    build: .
    container_name: prefect-bigquery-sync
    restart: unless-stopped

    depends_on:
      - prefect-server
    
    environment:
      # Prefect
      - PREFECT_WORKFLOW=${PREFECT_WORKFLOW:-combinado}
      - PREFECT_INTERVALO=${PREFECT_INTERVALO:-5}
      - PREFECT_API_URL=${PREFECT_API_URL:-http://prefect-server:4200/api}
      - PREFECT_STATE_FILE=/app/scripts/prefect/state/combinado.json
      
      # Banco de dados (do .env ou variĂˇveis de ambiente)
      - DB_ORIGEM_HOST=${DB_ORIGEM_HOST}
      - DB_ORIGEM_PORT=${DB_ORIGEM_PORT:-5432}
      - DB_ORIGEM_NAME=${DB_ORIGEM_NAME}
      - DB_ORIGEM_USER=${DB_ORIGEM_USER}
      - DB_ORIGEM_PASSWORD=${DB_ORIGEM_PASSWORD}
      - DB_ORIGEM_SSLMODE=${DB_ORIGEM_SSLMODE:-disable}
      
      # BigQuery
      - BIGQUERY_PROJECT_ID=${BIGQUERY_PROJECT_ID}
      - BIGQUERY_DATASET_ID_NIMBUS=${BIGQUERY_DATASET_ID_NIMBUS:-alertadb_cor_raw}
      - BIGQUERY_TABLE_ID=${BIGQUERY_TABLE_ID:-pluviometricos}
      - BIGQUERY_TABLE_ID_METEOROLOGICOS=${BIGQUERY_TABLE_ID_METEOROLOGICOS:-meteorologicos}

      # IntegraĂ§ĂŁo IA LNCC/Gypscie (futuro â€” deixar em branco atĂ© configurar)
      - GYPSCIE_API_URL=${GYPSCIE_API_URL:-}
      - GYPSCIE_API_KEY=${GYPSCIE_API_KEY:-}
      - GYPSCIE_WORKFLOW_ID=${GYPSCIE_WORKFLOW_ID:-}
      - GYPSCIE_ENVIRONMENT_ID=${GYPSCIE_ENVIRONMENT_ID:-}
    
    volumes:
      # Credenciais GCP
      - ./credentials:/app/credentials:ro
      # Arquivo .env
      - ./.env:/app/.env:ro
      # Logs
      - ./logs:/app/logs
      # Estado do serviĂ§o
      - ./scripts/prefect/state:/app/scripts/prefect/state
    
    networks:
      - prefect-network
    
    healthcheck:
      # Considera saudĂˇvel apĂłs o estado do serviĂ§o existir (apĂłs primeira execuĂ§ĂŁo)
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/scripts/prefect/state/combinado.json') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 600s

  # ServiĂ§o dedicado: apenas PLUVIOMĂ‰TRICOS
  prefect-pluviometricos:
    build: .
    container_name: prefect-bigquery-pluviometricos
    restart: unless-stopped

    depends_on:
      - prefect-server

    environment:
      # Prefect
      - PREFECT_WORKFLOW=pluviometricos
      - PREFECT_INTERVALO=${PREFECT_INTERVALO:-5}
      - PREFECT_API_URL=${PREFECT_API_URL:-http://prefect-server:4200/api}
      - PREFECT_STATE_FILE=/app/scripts/prefect/state/pluviometricos.json

      # Banco de dados (do .env ou variĂˇveis de ambiente)
      - DB_ORIGEM_HOST=${DB_ORIGEM_HOST}
      - DB_ORIGEM_PORT=${DB_ORIGEM_PORT:-5432}
      - DB_ORIGEM_NAME=${DB_ORIGEM_NAME}
      - DB_ORIGEM_USER=${DB_ORIGEM_USER}
      - DB_ORIGEM_PASSWORD=${DB_ORIGEM_PASSWORD}
      - DB_ORIGEM_SSLMODE=${DB_ORIGEM_SSLMODE:-disable}

      # BigQuery
      - BIGQUERY_PROJECT_ID=${BIGQUERY_PROJECT_ID}
      - BIGQUERY_DATASET_ID_NIMBUS=${BIGQUERY_DATASET_ID_NIMBUS:-alertadb_cor_raw}
      - BIGQUERY_TABLE_ID=pluviometricos
      - BIGQUERY_TABLE_ID_METEOROLOGICOS=${BIGQUERY_TABLE_ID_METEOROLOGICOS:-meteorologicos}

    volumes:
      - ./credentials:/app/credentials:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
      - ./scripts/prefect/state:/app/scripts/prefect/state

    networks:
      - prefect-network

  # ServiĂ§o dedicado: apenas METEOROLĂ“GICOS
  prefect-meteorologicos:
    build: .
    container_name: prefect-bigquery-meteorologicos
    restart: unless-stopped

    depends_on:
      - prefect-server

    environment:
      # Prefect
      - PREFECT_WORKFLOW=meteorologicos
      - PREFECT_INTERVALO=${PREFECT_INTERVALO:-5}
      - PREFECT_API_URL=${PREFECT_API_URL:-http://prefect-server:4200/api}
      - PREFECT_STATE_FILE=/app/scripts/prefect/state/meteorologicos.json

      # Banco de dados (do .env ou variĂˇveis de ambiente)
      - DB_ORIGEM_HOST=${DB_ORIGEM_HOST}
      - DB_ORIGEM_PORT=${DB_ORIGEM_PORT:-5432}
      - DB_ORIGEM_NAME=${DB_ORIGEM_NAME}
      - DB_ORIGEM_USER=${DB_ORIGEM_USER}
      - DB_ORIGEM_PASSWORD=${DB_ORIGEM_PASSWORD}
      - DB_ORIGEM_SSLMODE=${DB_ORIGEM_SSLMODE:-disable}

      # BigQuery
      - BIGQUERY_PROJECT_ID=${BIGQUERY_PROJECT_ID}
      - BIGQUERY_DATASET_ID_NIMBUS=${BIGQUERY_DATASET_ID_NIMBUS:-alertadb_cor_raw}
      - BIGQUERY_TABLE_ID=${BIGQUERY_TABLE_ID:-pluviometricos}
      - BIGQUERY_TABLE_ID_METEOROLOGICOS=meteorologicos

    volumes:
      - ./credentials:/app/credentials:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
      - ./scripts/prefect/state:/app/scripts/prefect/state

    networks:
      - prefect-network

networks:
  prefect-network:
    driver: bridge
